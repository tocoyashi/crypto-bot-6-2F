name: Backtest Runner

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install libraries
        run: pip install -r requirements.txt
      - name: Run Backtest
        run: python backtest.py
